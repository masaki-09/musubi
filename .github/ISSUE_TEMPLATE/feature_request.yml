name: ✨ Feature request / 機能要望
description: 新機能・改善のアイデア
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        アイデアを共有してくれてありがとうございます！
  - type: textarea
    id: problem
    attributes:
      label: どんな課題を解決しますか？ / What problem does this solve?
      placeholder: 「〜したいが、現状では〜」のように
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案 / Proposal
      description: 想定する API・UX・コマンドラインインターフェース等
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案 / Alternatives considered
  - type: dropdown
    id: component
    attributes:
      label: 影響箇所 / Component
      multiple: true
      options:
        - musubi-core
        - musubi-cli
        - musubi-wasm
        - WebUI
        - Documentation
        - Theory / Spec
        - Other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 補足 / Additional context
